<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        h2 {
            font-family: 'Poppins', sans-serif;
            color: blue;
            background-color: rgb(217, 197, 173);
            border: 1px solid rgb(45, 52, 14);
            text-align: center;
        }

        body {
            font-family: system-ui;
            background: #d1c7be;
            color: rgb(77, 58, 58);
            /* text-align: center; */
        }

        h1 {
            text-align: center;
        }

        #one {
            color: red
        }

        #two {
            color: #368751
        }

        #three {
            color: rgb(12, 12, 204)
        }

        #four {
            color: rgba(215, 46, 215, 0.759)
        }

        #five {
            color: hsl(316, 33%, 25%)
        }

        ol {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bolder;
            text-indent: 10px;
            font-size: x-large;


        }
    </style>
</head>

<body>
    <h1>👋 Hello World!</h1>
    <h2>lets learn about colours</h2>
    <p>
    <h2>Color can me Represented in
        <ol>
            <li id="one">Color Keywords</li>
            <li id="two">HEX colour code</li>
            <li id="three">RGB</li>
            <li id="four">RGBA</li>
            <li id="five">HSL</li>
        </ol>
        </p>

        <script src="script.js">Java</script>
</body>

</html>
