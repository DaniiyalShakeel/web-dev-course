<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadow Elements</title>
    <style>
        div {
            border: 1px solid black;
            padding: 20px;
            box-shadow: 6px 7px 9px 0px red;
        }

        .shadow {
            margin: 20px;
            border: 2px solid red;
            box-shadow: none;
            text-shadow: 6px 3px 5px #1a2195;
            border-radius: 20px;
            outline: 1px solid black;
            outline-offset: 9px;
            outline-style: double;
        }
    </style>
</head>

<body>
    <div>
        Hello I am Daniyal

    </div>
    <div class="shadow">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Dicta sed ipsum, nulla placeat necessitatibus nostrum
        laboriosam provident! Maiores voluptatum ipsum ullam minima sapiente!
    </div>
</body>

</html>
