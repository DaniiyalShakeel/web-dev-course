<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise </title>
    <style>
        /* @import url('https://fonts.googleapsis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');        */

        * {
            
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #bec5c8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main {
            width: 340px;
            height: auto;
            border: 1px solid black;
            background-color: rgb(215, 225, 229);
            border-radius: 8px;
        }

        img {
            width: 100%;
            padding: 10px;
            height: 240px;
            /* object-fit: cover; */
            border-radius: 18px;

        }

        .tag span {
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid #c9baba;
            border-radius: 20px;
            font-size: 14px;
            color: #777;
            margin-right: px;
            margin-left: 7px;
            margin-top: 10px;


        }

        div h2 {
            margin-left: 16px;

        }

        div p {
            margin-left: 17px
        }

        .button button {
            background: #dbeafe;
            color: #3b82f6;
            border: none;
            padding: 14px 10px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;

        }

        .button {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="main">

        <div class="image">
            <img src="https://content.api.news/v3/images/bin/1e33030683a22e373eb0fb0551fd6aa0" alt="My Image">
        </div>
        <div class="tag">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div>
            <h2>My Name is Daniyal</h2>
        </div>
        <div>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Animi repellat inventore totam eligendi odio
                illo qui delectus natus</p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
