<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video 7 - Daniyaltech</title>
</head>

<body>
    <h1>Form to Apply for a Job</h1>
    <div>
        <form action="">
            <div>
                <label for="username">Name:</label>
                <input type="text" name="name" id="username" placeholder="Enter your name" autofocus>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Enter your email">
            </div>
            <div>
                <label for="Password">Password:</label>
                <input type="password" name="Password" id="Password" placeholder="Enter your password">
            </div>
            <div>
                <label for="Phone">Phone:</label>
                <input type="tel" name="Phone" id="Phone" placeholder="Enter your phone number">
            </div>
            <div>
                <input type="radio" name="gender" id="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female">
                <label for="female">Female</label>
                <!-- <input type="radio" name="gender" id="guy">
                <label for="guy">Guy</label> -->
            </div>
            <div>
                <input type="checkbox" name="terms" id="checkbox">
                <label for="checkbox">I agree to the terms and conditions</label><br>
                <!-- <input type="radio" name="terms" id="checkbox2">
                <label for="checkbox2">I can't agree to the terms and conditions</label> -->
            </div>
            <div>
                <label for="day">Joining Date:</label>
                <input type="date" name="day" id="day">
            </div>
            <input type="radio" name="yes" id="yes">
            <label for="yes">Yes</label>
            <input type="radio" name="yes" id="no">
            <label for="no">NO</label>
            <div>
                <label for="1234">Job ID</label>
                <input type="search" name="job_id" id="1234" placeholder="Enter the job ID">
            </div>
            <label for="black">Choose your favorite color</label>
            <input type="color" name="black" id="black">
            <div>
                <label for="daniyal">Apply Time</label>
                <input type="time" name="daniyal" id="daniyal">
            </div>
            <div>
                <label for="age" required>Age</label>
                <input type="number" name="age" id="age" placeholder="Enter your age" >
            </div>
            <div>
                <label for="experience">Experience:</label>
                <input type="range" name="experience" id="experience" min="3" max="300">
            </div>
            <div>

                <textarea name="" id="88" cols="20" rows="5" placeholder="Add your Additional Information"></textarea>
            </div>
            <select name="fruit" required>
                <option value="Apple">Apple</option>
                <option value="Banana">Banana</option>
                <option value="Orange">Orange</option>
                <option value="Grape">Grape</option>
                <option value="Mango">Mango</option>
            </select>
            <div>
                <button type="submit">Submit Application</button>
            </div>
        </form>
    </div>
</body>

</html>
