<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image video audio</title>
</head>

<body>
    <video src="video.mp4" height="300" controls poster="image.jpg">Video</video>
    <audio src="audio.mp3" controls>Audio</audio>
    <img src="img.svg" alt="SVG Image">
    <link rel="icon" type="image/svg+xml" href="img.svg">
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="red" stroke-width="4" fill="blue" />
    </svg>
    <br>
    <iframe src="https://daniyal.techyst.net/" width="400" height="500"></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/Jw9H_OdcKC8?si=ytc5JF9G3VfTrC7M"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <!-- quick quiz -->
    <!-- create a website whick show video of different category using iframe, video, audio tags and also show some images in" -->
    <div>
        <iframe src="https://www.techyst.net/" width="400" height="500" frameborder="0"></iframe>
    </div>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/0HyIda5eub8?si=0ElxssDG8quEOwQV&amp;start=233"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
