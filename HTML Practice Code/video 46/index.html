<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation</title>
    <style>
        .container {
            width: 300px;
            gap: 20px;
            height: 300px;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;



        }

        .boxx {
            width: 100px;
            height: 100px;
            /* background-color: coral; */
            /* animation: move 2s infinite alternate; */
            display: flex;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            /* animation: daniyal;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.63, -0.46, 0.28, 1.71);
            animation-direction: alternate-reverse; */
            
            animation: daniyal 1s infinite alternate-reverse cubic-bezier(0.63, -0.46, 0.28, 1.71);
                                }
        .boxx1 {
            width: 100px;
            height: 100px;
            /* background-color: rgb(172, 132, 117); */
            /* animation: move 2s infinite alternate; */
            display: flex;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            /* animation: daniyal;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.63, -0.46, 0.28, 1.71);
            animation-direction: alternate-reverse; */
            
            animation: identifier 1s infinite alternate-reverse cubic-bezier(0.63, -0.46, 0.28, 1.71);
                                }
        .boxx2 {
            width: 100px;
            height: 100px;
            /* background-color: rgb(172, 132, 117); */
            /* animation: move 2s infinite alternate; */
            display: flex;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            gap: 20px;
            /* animation: daniyal;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.63, -0.46, 0.28, 1.71);
            animation-direction: alternate-reverse; */
            
            animation: move 1s infinite alternate-reverse cubic-bezier(0.63, -0.46, 0.28, 1.71);
                                }



        @keyframes daniyal {
            from {
                transform: translatex(300px);
                background-color: coral;

            }
        
            to {
                transform: translatey(200px);
                background-color: lightgreen;
            }
        }
            @keyframes identifier {
                from{
                    transform: scale3d(10);
                    background-color: coral;
                }
                to{
                    transform: scale3d(20);
                    background-color: lightgreen;
                }
            }
                @keyframes move {
                from{
                    transform: skewY(0deg);
                    background-color: coral;
                }
                to{
                    transform: skewY(20deg);
                    background-color: lightgreen;
                }
            
            /* @keyframes move {
                0%{
                    transform: rotatex(100deg);
                    background-color: coral;
                }
                20%{
                    transform: rotatex(200deg);
                    background-color: lightgreen;
                }
                40%{
                    transform: rotatex(300deg);
                    background-color: lightcoral;
                }
                60%{
                    transform: rotatey(400deg);
                    background-color: lightseagreen;
                }
                80%{
                    transform: rotatey(500deg);
                    background-color: lightsteelblue;
                }
                100%{
                    transform: rotatey(600deg);
                    background-color: lightyellow;
                } */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="boxx">Daniyal</div>
        <div class="boxx1">Daniyal</div>
        <div class="boxx2">Daniyal</div>

    </div>
    <!-- <div class="demo">
        <div class="grow">this is grown</div>
        <div class="grows-and-stays">This grows and stays big.</div>
    </div> -->
</body>

</html>
