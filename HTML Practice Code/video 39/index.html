<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container {
            border: 2px solid black;
            display: grid;
            grid-template-areas: "nav nav nav nav nav"
                "main main empty side side"
                "footer footer footer footer footer"
                "one one one one one"
                "two two two two two";
        }

        .items {
            /* width: 55px; */
            height: 55px;
            border: 2px solid red;
        }

        .item-1 {
            grid-area: nav;
            background-color: rgb(67, 45, 16);
            color: white;
        }

        .item-2 {
            grid-area: main;
            background-color: aquamarine;
            color: white;
        }

        .item-3 {
            grid-area: side;
            background-color: rgb(219, 219, 38);
            color: white;
        }

        .item-4 {
            grid-area: one;
            background-color: blueviolet;
            color: white;
        }

        .item-5 {
            grid-area: empty;
            background-color: rgb(218, 147, 40);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="items item-1">1</div>
        <div class="items item-2">2</div>
        <div class="items item-3">3</div>
        <div class="items item-4">4</div>
        <div class="items item-5">5</div>
    </div>
</body>

</html>
