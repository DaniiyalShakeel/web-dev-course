<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Boxmodel</title>
    <style>
       div{
        background-color: rgb(84, 121, 133);
        color: rgb(255, 255, 255);
        
       }
       .one1{
        background-color: rgb(0, 0, 0);
        margin: 10px;
        border: 2px solid rgb(255, 0, 0);
        height: 100px;
        width: 200px;
        text-align: center;
        line-height: 60px;
        padding: 20px;
        box-sizing: border-box;
       }
       *{
        margin: 0;
        padding: 0;

       }
    </style>
</head>
<body>
    <div class="one one1">
        hi this is first div
    </div>
    <div class="one sec">
        this is second div
    </div>
</body>
</html>
