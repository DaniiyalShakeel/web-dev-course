<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .internalcss {
            background-color: rgb(78, 142, 163);
            color: rgb(139, 19, 19);
            border: 2px solid black;

        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Three ways to add CSS in HTML</h1>

    <ol style="background-color: antiquewhite; color: blue; border: 2px solid black; ">
        <li>Inline CSS</li>
    </ol>


    <ol class="internalcss">
        <li>Internal CSS</li>
    </ol>

    <label>
        <ol class="externalcss">
            <li>External CSS</li>
        </ol>
    </label>
</body>

</html>
