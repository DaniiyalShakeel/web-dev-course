<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS positon Property</title>
    <style>
        .parent {
            border: 1px solid black;
            margin: 40px;
            padding: 40px;
            /* Expection; transform, filter and perspective properties can also make an element appear as position */
            position: absolute; 
            /* filter: invert(0);   */
            /* transform: translate(0); */
            /* perspective: 0em; */
        }

        .box {
            border: 2px solid black;
            margin: 3px;
            padding: 3px;
            width: 80vw;
            height: 100px;
        }

        .box1 {
            background-color: antiquewhite;
            /* position: absolute;
            top: 0%;
            left: 0px; */
            
            
        }
        
        .box2 {
            background-color: aqua;
            /* position: relative; */
            /* top: -26px;
            left: 21px;
            right: 20px; */
            position: sticky;
            top: 0px;
            left: 10px;
        }

        .box3 {
            background-color: yellow;
            /* position: absolute;
            top: 0px;
            z-index: auto; */
        }

        .box4 {
            background-color: aquamarine;
        }

        .box5 {
            background-color: brown;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
    </div>
</body>

</html>
